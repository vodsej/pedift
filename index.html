<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>pedift — private offline PDF editor</title>
    <meta
      name="description"
      content="Edit PDFs entirely in your browser. Nothing is uploaded. Works offline."
    />
    <script>
      // Apply the saved/OS theme before first paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('pedift.theme')
          if (t !== 'light' && t !== 'dark') {
            t =
              window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          }
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
